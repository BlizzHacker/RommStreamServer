<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>RomM Controller</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation;-webkit-user-select:none;user-select:none}
body{background:#0B1020;color:#fff;font-family:Arial;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:8px}
h2{color:#7DD3FC;margin:4px 0;font-size:18px}
#status{color:#9FB3D9;font-size:12px;margin-bottom:6px;text-align:center;min-height:18px}
select{background:#121B33;color:#F8FAFC;border:2px solid #334B7A;border-radius:6px;padding:6px 10px;font-size:13px;margin-bottom:6px}
#controller{display:flex;flex-direction:column;align-items:center;gap:6px;max-width:380px;width:100%}
.row{display:flex;gap:6px;align-items:center;justify-content:center}
.btn{background:#1E2D50;border:2px solid #334B7A;border-radius:8px;color:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:bold}
.btn:active,.btn.active{background:#7DD3FC;color:#0B1020;border-color:#7DD3FC}
/* D-Pad */
#dpad{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px 50px;gap:2px}
#dpad .btn{width:50px;height:50px;font-size:22px;border-radius:6px}
#btn-up{grid-column:2;grid-row:1}
#btn-left{grid-column:1;grid-row:2}
#btn-right{grid-column:3;grid-row:2}
#btn-down{grid-column:2;grid-row:3}
/* Face buttons */
#face{display:grid;grid-template-columns:50px 50px;grid-template-rows:50px 50px;gap:4px;margin-left:20px}
#face .btn{width:50px;height:50px;border-radius:50%;font-size:18px}
#btn-Y{background:#1E2D50;border-color:#FDE68A;color:#FDE68A}
#btn-Y:active{background:#FDE68A;color:#0B1020}
#btn-B{background:#1E2D50;border-color:#EF4444;color:#EF4444}
#btn-B:active{background:#EF4444;color:#fff}
#btn-X{background:#1E2D50;border-color:#3B82F6;color:#3B82F6}
#btn-X:active{background:#3B82F6;color:#fff}
#btn-A{background:#1E2D50;border-color:#4ADE80;color:#4ADE80}
#btn-A:active{background:#4ADE80;color:#0B1020}
/* Center buttons */
#center-btns{display:flex;gap:20px;margin:4px 0}
#center-btns .btn{width:60px;height:32px;font-size:11px;border-radius:16px}
/* Shoulder */
#shoulders{display:flex;gap:40px}
#shoulders .btn{width:120px;height:34px;font-size:13px;border-radius:6px}
/* Pair button */
#pair{background:#4ADE80;color:#0B1020;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer;margin-top:6px}
#pair.hidden{display:none}
</style></head><body>
<h2>RomM Controller</h2>
<div id="status">Searching for stream...</div>
<select id="layout" onchange="setLayout(this.value)">
<option value="xbox">Xbox / Universal</option>
<option value="n64">Nintendo 64</option>
<option value="snes">SNES</option>
<option value="genesis">Genesis / Mega Drive</option>
<option value="psx">PlayStation</option>
<option value="gba">Game Boy Advance</option>
</select>
<div id="controller">
<div class="row">
<div id="dpad">
<button class="btn" id="btn-up"    onpointerdown="send('up',true)" onpointerup="send('up',false)" onpointerleave="send('up',false)">▲</button>
<button class="btn" id="btn-left"  onpointerdown="send('left',true)" onpointerup="send('left',false)" onpointerleave="send('left',false)">◀</button>
<button class="btn" id="btn-right" onpointerdown="send('right',true)" onpointerup="send('right',false)" onpointerleave="send('right',false)">▶</button>
<button class="btn" id="btn-down"  onpointerdown="send('down',true)" onpointerup="send('down',false)" onpointerleave="send('down',false)">▼</button>
</div>
<div id="face">
<button class="btn" id="btn-Y" onpointerdown="send('x',true)" onpointerup="send('x',false)" onpointerleave="send('x',false)">Y</button>
<button class="btn" id="btn-B" onpointerdown="send('a',true)" onpointerup="send('a',false)" onpointerleave="send('a',false)">B</button>
<button class="btn" id="btn-X" onpointerdown="send('y',true)" onpointerup="send('y',false)" onpointerleave="send('y',false)">X</button>
<button class="btn" id="btn-A" onpointerdown="send('b',true)" onpointerup="send('b',false)" onpointerleave="send('b',false)">A</button>
</div>
</div>
<div id="shoulders">
<button class="btn" onpointerdown="send('l1',true)" onpointerup="send('l1',false)" onpointerleave="send('l1',false)">LB</button>
<button class="btn" onpointerdown="send('r1',true)" onpointerup="send('r1',false)" onpointerleave="send('r1',false)">RB</button>
</div>
<div id="center-btns">
<button class="btn" onpointerdown="send('select',true)" onpointerup="send('select',false)" onpointerleave="send('select',false)">SELECT</button>
<button class="btn" onpointerdown="send('start',true)" onpointerup="send('start',false)" onpointerleave="send('start',false)">START</button>
</div>
</div>
<button id="pair" class="hidden" onclick="pairGamepad()">🎮 Pair Bluetooth Controller</button>
<script>
let sid='',connected=false;
let pollTimer=null;
const layouts={xbox:{y:'x',b:'a',x:'y',a:'b'},n64:{y:'',b:'a',x:'',a:'b'},snes:{y:'x',b:'a',x:'y',a:'b'},genesis:{y:'x',b:'a',x:'y',a:'b'},psx:{y:'',b:'a',x:'',a:'b'},gba:{y:'',b:'a',x:'',a:'b'}};
let curLayout='xbox';

function setLayout(name){
curLayout=name;
let l=layouts[name]||layouts.xbox;
let face=document.getElementById('face');
['Y','B','X','A'].forEach((btn,i)=>{
let fb=face.children[i];
let mapped=l[btn.toLowerCase()]||'';
fb.style.display=mapped?'':'none';
});
}

function connect(id){sid=id;connected=true;document.getElementById('status').textContent='Connected: '+sid;if(pollTimer){clearInterval(pollTimer);pollTimer=null}}
function disconnect(){connected=false;sid='';document.getElementById('status').textContent='Disconnected — searching...';pollStreams()}

async function pollStreams(){
try{
let r=await fetch('/api/stream/status');
let d=await r.json();
let streams=d.streams||[];
if(streams.length>0&&!connected) connect(streams[0].id||streams[0]);
else if(streams.length===0&&connected) disconnect();
}catch(e){}
}

function send(key,pressed){
if(!connected||!sid)return;
let l=layouts[curLayout]||layouts.xbox;
let mapped=l[key]||key;
fetch('/api/stream/'+sid+'/input',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:mapped,pressed:pressed})}).catch(()=>{});
}

async function pairGamepad(){
try{
let device=await navigator.bluetooth.requestDevice({acceptAllDevices:true});
document.getElementById('status').textContent='Paired: '+device.name;
document.getElementById('pair').classList.add('hidden');
startGamepadLoop();
}catch(e){
document.getElementById('status').textContent='Pairing failed';
}
}

function startGamepadLoop(){
setInterval(()=>{
if(!connected)return;
let gps=navigator.getGamepads();
for(let g of gps){
if(!g)continue;
for(let i=0;i<g.buttons.length;i++){
if(g.buttons[i].value>0.5) send('gpb'+i,true);
else send('gpb'+i,false);
}
for(let i=0;i<g.axes.length;i++){
let v=g.axes[i];
if(Math.abs(v)>0.5) send('gpa'+i+(v>0?'+':'-'),true);
}
}
},50);
}

(function(){
let p=new URLSearchParams(location.search);
let s=p.get('sid');
if(s){connect(s);return}
pollStreams();
pollTimer=setInterval(pollStreams,3000);
if(navigator.bluetooth)document.getElementById('pair').classList.remove('hidden');
})();
</script></body></html>
